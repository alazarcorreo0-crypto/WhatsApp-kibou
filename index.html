<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Envío Rápido Multi-Guía - J&T</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        /* Animación para el flash de captura */
        @keyframes flashEffect {
            0% { opacity: 0.8; background-color: rgba(255, 255, 255, 0.9); }
            100% { opacity: 0; background-color: transparent; }
        }
        .flash-activo {
            animation: flashEffect 0.2s ease-out;
        }
    </style>
</head>
<body class="bg-gray-100 font-sans min-h-screen flex flex-col items-center p-4 select-none">

    <div id="pantalla-flash" class="fixed inset-0 pointer-events-none z-50 opacity-0"></div>

    <main class="w-full max-w-md bg-white rounded-2xl shadow-xl overflow-hidden my-2 flex flex-col min-h-[650px]">
        <header class="bg-slate-800 text-white p-4 text-center">
            <h1 class="text-lg font-bold tracking-wide uppercase">Paquetería J&T</h1>
            <p class="text-xs text-slate-400 mt-0.5">Módulo Multi-Guía Rápido - Villa Juárez</p>
        </header>

        <div class="p-5 flex-1 flex flex-col justify-between space-y-4">
            
            <section class="bg-gray-50 p-3 rounded-xl border border-gray-200 relative">
                <button type="button" onclick="alternarEscaner()" id="btnEscanner" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium py-2.5 px-4 rounded-lg transition text-sm flex justify-center items-center gap-2 shadow-xs">
                    <span id="txtBtnEscaner">📷 Activar Escáner de Guía</span>
                </button>
                
                <div id="lector-qr" class="mt-2 rounded-lg overflow-hidden hidden transition-all duration-200"></div>
                
                <div id="aviso-flotante" class="absolute bottom-5 left-1/2 -translate-x-1/2 bg-emerald-600 text-white font-bold text-xs py-1.5 px-3 rounded-full shadow-md hidden z-10 transition-all">
                    ¡Guía Agregada! ➔
                </div>
            </section>

            <div class="space-y-4 flex-1">
                <div>
                    <label class="block text-[11px] font-bold text-gray-500 uppercase mb-0.5">Número de WhatsApp del Cliente</label>
                    <input type="tel" id="inputTelefono" inputmode="numeric" pattern="[0-9]*" placeholder="Ej: 6671234567" class="w-full border border-gray-300 rounded-lg p-2.5 font-mono text-sm focus:ring-2 focus:ring-blue-500 focus:outline-none">
                </div>

                <div>
                    <label class="block text-[11px] font-bold text-gray-500 uppercase mb-0.5">Escanear o Escribir Guía</label>
                    <div class="flex gap-2">
                        <input type="text" id="inputGuia" placeholder="Presiona Enter o agregar" onkeydown="detectarEnterGuia(event)" class="w-full border border-gray-300 rounded-lg p-2.5 uppercase font-mono text-sm focus:ring-2 focus:ring-blue-500 focus:outline-none">
                        <button type="button" onclick="agregarGuiaLista()" class="bg-slate-700 text-white px-4 rounded-lg font-bold text-sm hover:bg-slate-800">Agregar</button>
                    </div>
                </div>

                <div>
                    <div class="flex justify-between items-center mb-1">
                        <label class="block text-[11px] font-bold text-gray-500 uppercase">Guías Acumuladas (<span id="contadorGuias">0</span>)</label>
                        <button type="button" onclick="limpiarGuias()" class="text-[10px] text-red-600 font-bold hover:underline">Limpiar todas</button>
                    </div>
                    <div id="listaGuias" class="flex flex-wrap gap-1.5 p-3 bg-gray-50 border border-gray-200 rounded-xl min-h-[60px] max-h-[120px] overflow-y-auto transition-colors duration-200">
                        <span class="text-xs text-gray-400 m-auto">Ninguna guía escaneada</span>
                    </div>
                </div>

                <div>
                    <label class="block text-[11px] font-bold text-gray-500 uppercase mb-0.5">Comentario / Nota Adicional (Opcional)</label>
                    <textarea id="inputComentario" rows="2" placeholder="Ej: Son 4 cajas en total..." class="w-full border border-gray-300 rounded-lg p-2.5 text-sm focus:ring-2 focus:ring-blue-500 focus:outline-none"></textarea>
                </div>
            </div>

            <div class="pt-2">
                <button onclick="enviarNotificacionWhatsApp()" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-3 rounded-xl shadow-md text-sm transition flex justify-center items-center gap-2">
                    <span>🚀 Enviar Mensaje Único</span>
                </button>
            </div>

        </div>
    </main>

    <script>
        let html5QrcodeScanner;
        let LISTA_GUIAS = [];
        let controlBloqueoLectura = false; // Evita lecturas repetidas en ráfaga de milisegundos

        // 🔊 Generador de sonido nativo (Beep electrónico de éxito)
        function sonarBeepExito() {
            try {
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const oscillator = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();

                oscillator.type = 'sine';
                oscillator.frequency.setValueAtTime(950, audioCtx.currentTime); // Tono agudo y limpio
                gainNode.gain.setValueAtTime(0.15, audioCtx.currentTime); // Volumen moderado

                oscillator.connect(gainNode);
                gainNode.connect(audioCtx.destination);

                oscillator.start();
                oscillator.stop(audioCtx.currentTime + 0.1); // Duración de 100ms
            } catch (e) {
                console.log("Audio no soportado o bloqueado por el navegador.");
            }
        }

        function alternarEscaner() {
            const lectorDiv = document.getElementById('lector-qr');
            const btn = document.getElementById('btnEscanner');
            
            if (lectorDiv.classList.contains('hidden')) {
                lectorDiv.classList.remove('hidden'); 
                btn.textContent = "🛑 Apagar Cámara"; 
                btn.classList.replace('bg-blue-600', 'bg-gray-600');
                
                html5QrcodeScanner = new Html5Qrcode("lector-qr");
                html5QrcodeScanner.start(
                    { facingMode: "environment" }, 
                    { fps: 12, qrbox: { width: 250, height: 140 } }, 
                    (txt) => {
                        const codigoLimpio = txt.toUpperCase().trim();
                        inyectarGuiaArray(codigoLimpio);
                    }, 
                    () => {}
                ).catch(err => alert("Error al acceder a la cámara: " + err));
            } else { 
                detenerEscaner(); 
            }
        }

        function detenerEscaner() {
            if (html5QrcodeScanner) {
                html5QrcodeScanner.stop().then(() => {
                    document.getElementById('lector-qr').classList.add('hidden');
                    document.getElementById('btnEscanner').textContent = "📷 Activar Escáner de Guía";
                    document.getElementById('btnEscanner').classList.replace('bg-gray-600', 'bg-blue-600');
                }).catch(err => console.error(err));
            }
        }

        function detectarEnterGuia(e) {
            if (e.key === 'Enter') {
                e.preventDefault();
                agregarGuiaLista();
            }
        }

        function agregarGuiaLista() {
            const input = document.getElementById('inputGuia');
            const valor = input.value.trim().toUpperCase();
            if(valor) {
                inyectarGuiaArray(valor);
                input.value = '';
                input.focus();
            }
        }

        // LÓGICA CENTRAL CON ALERTAS MEJORADAS
        function inyectarGuiaArray(codigo) {
            if (controlBloqueoLectura) return; // Si está procesando un aviso anterior, ignora transitoriamente
            
            const cajaLista = document.getElementById('listaGuias');

            // ⚠️ ALERTA DE REPETIDO: Si ya existe en la lista
            if (LISTA_GUIAS.includes(codigo)) {
                controlBloqueoLectura = true;
                cajaLista.classList.replace('bg-gray-50', 'bg-red-100'); // Cambia el contenedor a rojo temporal
                if (navigator.vibrate) navigator.vibrate([80, 50, 80]); // Doble vibración corta de advertencia
                
                setTimeout(() => {
                    cajaLista.classList.replace('bg-red-100', 'bg-gray-50');
                    controlBloqueoLectura = false;
                }, 800);
                return;
            }

            // ⭐ LECTURA CORRECTA (NUEVA GUÍA)
            controlBloqueoLectura = true;
            LISTA_GUIAS.push(codigo);
            
            // 1. Ejecutar sonido y vibración física
            sonarBeepExito();
            if (navigator.vibrate) navigator.vibrate(100);

            // 2. Ejecutar Flash Visual en pantalla
            const flash = document.getElementById('pantalla-flash');
            flash.classList.add('flash-activo');
            setTimeout(() => flash.classList.remove('flash-activo'), 200);

            // 3. Desplegar letrero flotante temporal con el nombre de la guía
            const aviso = document.getElementById('aviso-flotante');
            aviso.textContent = `✓ ${codigo.substring(0, 10)}...`;
            aviso.classList.remove('hidden');

            renderizarEtiquetasGuias();

            // Desbloquear para la siguiente lectura tras un breve respiro (evita rebotes raros de cámara)
            setTimeout(() => {
                aviso.classList.add('hidden');
                controlBloqueoLectura = false;
            }, 700);
        }

        function eliminarGuiaEspecifica(codigo) {
            LISTA_GUIAS = LISTA_GUIAS.filter(g => g !== codigo);
            renderizarEtiquetasGuias();
        }

        function limpiarGuias() {
            LISTA_GUIAS = [];
            renderizarEtiquetasGuias();
        }

        function renderizarEtiquetasGuias() {
            const contenedor = document.getElementById('listaGuias');
            const contador = document.getElementById('contadorGuias');
            contenedor.innerHTML = '';
            contador.textContent = LISTA_GUIAS.length;

            if (LISTA_GUIAS.length === 0) {
                contenedor.innerHTML = `<span class="text-xs text-gray-400 m-auto">Ninguna guía escaneada</span>`;
                return;
            }

            LISTA_GUIAS.forEach(guia => {
                const badge = document.createElement('div');
                badge.className = "bg-blue-100 text-blue-800 text-[11px] font-mono font-bold px-2 py-1 rounded-lg flex items-center gap-1.5 border border-blue-200 shadow-2xs";
                badge.innerHTML = `
                    <span>${guia}</span>
                    <button type="button" onclick="eliminarGuiaEspecifica('${guia}')" class="text-blue-500 hover:text-red-600 font-extrabold text-xs focus:outline-none">×</button>
                `;
                contenedor.appendChild(badge);
            });
        }

        function enviarNotificacionWhatsApp() {
            const telefono = document.getElementById('inputTelefono').value.trim().replace(/\D/g, ''); 
            const comentario = document.getElementById('inputComentario').value.trim();

            if (!telefono) {
                alert("Por favor, ingresa el número de teléfono del cliente.");
                return;
            }
            if (LISTA_GUIAS.length === 0) {
                alert("Debes escanear o ingresar al menos un número de guía.");
                return;
            }

            const ahora = new Date();
            const hora = ahora.getHours(); 
            let saludo = "¡Buenas tardes!";
            if (hora < 12) saludo = "¡Buenos días!";

            let textoGuias = "";
            if (LISTA_GUIAS.length === 1) {
                textoGuias = `con número de seguimiento *${LISTA_GUIAS[0]}*`;
            } else {
                textoGuias = `con los siguientes números de seguimiento:\n`;
                LISTA_GUIAS.forEach(g => { textoGuias += `• *${g}*\n`; });
                textoGuias = textoGuias.trim();
            }

            let mensaje = `✨ ${saludo} ✨\n\n`;
            mensaje += `Le saludamos desde su punto de entrega *Paquetería J&T* (ubicados a un costado de Coppel, Villa Juárez). 📍\n\n`;
            mensaje += `Tenemos el gusto de informarle que su paquete ${textoGuias} ya está disponible para recoger. 📦✅\n\n`;
            mensaje += `Le sugerimos pasar por él a más tardar el día de hoy para evitar que sea devuelto a origen. ⚠️ Recuerde traer su *INE en físico* para realizar la entrega. 🪪\n\n`;
            
            if (comentario) mensaje += `*Nota adicional:* ${comentario}\n\n`;
            mensaje += `¡Será un placer atenderle! 😊`;

            const urlWhatsapp = `https://wa.me/${telefono}?text=${encodeURIComponent(mensaje)}`;
            window.open(urlWhatsapp, '_blank');
            
            document.getElementById('inputTelefono').value = '';
            document.getElementById('inputComentario').value = '';
            limpiarGuias();
            detenerEscaner();
        }
    </script>
</body>
</html>
