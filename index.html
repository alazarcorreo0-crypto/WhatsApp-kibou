<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Envío Rápido WhatsApp - J&T Villa Juárez</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
</head>
<body class="bg-gray-100 font-sans min-h-screen flex flex-col items-center p-4">

    <main class="w-full max-w-md bg-white rounded-2xl shadow-xl overflow-hidden my-2 flex flex-col min-h-[620px]">
        <header class="bg-slate-800 text-white p-4 text-center">
            <h1 class="text-lg font-bold tracking-wide uppercase">Paquetería J&T</h1>
            <p class="text-xs text-slate-400 mt-0.5">Envío Rápido de Notificaciones - Villa Juárez</p>
        </header>

        <div class="p-5 flex-1 flex flex-col justify-between space-y-4">
            
            <section class="bg-gray-50 p-3 rounded-xl border border-gray-200">
                <button type="button" onclick="alternarEscaner()" id="btnEscanner" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium py-2.5 px-4 rounded-lg transition text-sm flex justify-center items-center gap-2 shadow-xs">
                    <span>📷 Activar Escáner de Guía</span>
                </button>
                <div id="lector-qr" class="mt-2 rounded-lg overflow-hidden hidden"></div>
            </section>

            <div class="space-y-4 flex-1">
                <div>
                    <label class="block text-[11px] font-bold text-gray-500 uppercase mb-0.5">Número de Guía</label>
                    <input type="text" id="inputGuia" placeholder="Escanea el código o escribe manual" class="w-full border border-gray-300 rounded-lg p-2.5 uppercase font-mono text-sm focus:ring-2 focus:ring-blue-500 focus:outline-none">
                </div>

                <div>
                    <label class="block text-[11px] font-bold text-gray-500 uppercase mb-0.5">Número de WhatsApp</label>
                    <input type="tel" id="inputTelefono" inputmode="numeric" pattern="[0-9]*" placeholder="Ej: 6671234567" class="w-full border border-gray-300 rounded-lg p-2.5 font-mono text-sm focus:ring-2 focus:ring-blue-500 focus:outline-none">
                </div>

                <div>
                    <label class="block text-[11px] font-bold text-gray-500 uppercase mb-0.5">Comentario / Nota Adicional (Opcional)</label>
                    <textarea id="inputComentario" rows="2" placeholder="Ej: Es un paquete grande, pasar antes de las 6..." class="w-full border border-gray-300 rounded-lg p-2.5 text-sm focus:ring-2 focus:ring-blue-500 focus:outline-none"></textarea>
                </div>
            </div>

            <div class="pt-2">
                <button onclick="enviarNotificacionWhatsApp()" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-3 rounded-xl shadow-md text-sm transition flex justify-center items-center gap-2">
                    <span>🚀 Enviar a WhatsApp</span>
                </button>
            </div>

        </div>
    </main>

    <script>
        // LÓGICA DEL ESCÁNER INTEGRAL DE TU V13
        let html5QrcodeScanner;
        
        function alternarEscaner() {
            const lectorDiv = document.getElementById('lector-qr');
            const btn = document.getElementById('btnEscanner');
            
            if (lectorDiv.classList.contains('hidden')) {
                lectorDiv.classList.remove('hidden'); 
                btn.textContent = "🛑 Apagar Cámara"; 
                btn.classList.replace('bg-blue-600', 'bg-gray-600');
                
                html5QrcodeScanner = new Html5Qrcode("lector-qr");
                
                // Configuración exacta que te jala al tiro con la cámara trasera
                html5QrcodeScanner.start(
                    { facingMode: "environment" }, 
                    { fps: 10, qrbox: { width: 250, height: 140 } }, 
                    (txt) => {
                        document.getElementById('inputGuia').value = txt.toUpperCase(); 
                        detenerEscaner();
                    }, 
                    () => {}
                ).catch(err => alert("Error al acceder a la cámara: " + err));
            } else { 
                detenerEscaner(); 
            }
        }

        function detenerEscaner() {
            if (html5QrcodeScanner) {
                html5QrcodeScanner.stop().then(() => {
                    document.getElementById('lector-qr').classList.add('hidden');
                    document.getElementById('btnEscanner').textContent = "📷 Activar Escáner de Guía";
                    document.getElementById('btnEscanner').classList.replace('bg-gray-600', 'bg-blue-600');
                }).catch(err => console.error(err));
            }
        }

        // LÓGICA DE ENVÍO Y CONFIGURACIÓN DE MENSAJE DINÁMICO
        function enviarNotificacionWhatsApp() {
            const guia = document.getElementById('inputGuia').value.trim().toUpperCase();
            const telefono = document.getElementById('inputTelefono').value.trim().replace(/\D/g, ''); 
            const comentario = document.getElementById('inputComentario').value.trim();

            if (!telefono) {
                alert("Por favor, ingresa el número de teléfono del cliente.");
                return;
            }

            // 🕒 Captura de hora del teléfono para definir el saludo de forma automática
            const ahora = new Date();
            const hora = ahora.getHours(); 
            let saludo = "¡Buenas tardes!"; // Formato de las 12:00 PM en adelante

            if (hora < 12) {
                saludo = "¡Buenos días!"; // Formato antes de las 12:00 PM
            }

            // 💬 Armado del mensaje con la estructura oficial que me pasaste
            let mensaje = `✨ ${saludo} ✨\n\n`;
            mensaje += `Le saludamos desde su punto de entrega *Paquetería J&T* (ubicados a un costado de Coppel, Villa Juárez). 📍\n\n`;
            mensaje += `Tenemos el gusto de informarle que su paquete con número de seguimiento *${guia || 'N/A'}* ya está disponible para recoger. 📦✅\n\n`;
            mensaje += `Le sugerimos pasar por él a más tardar el día de hoy para evitar que sea devuelto a origen. ⚠️ Recuerde traer su *INE en físico* para realizar la entrega. 🪪\n\n`;
            
            // Si agregaron alguna nota manual en el mostrador, se suma aquí abajo
            if (comentario) {
                mensaje += `*Nota adicional:* ${comentario}\n\n`;
            }
            
            mensaje += `¡Será un placer atenderle! 😊`;

            // Construcción del enlace dinámico oficial de WhatsApp sin intermediarios
            const urlWhatsapp = `https://wa.me/${telefono}?text=${encodeURIComponent(mensaje)}`;
            
            // Abre WhatsApp en una pestaña nueva o directamente en la App del cel
            window.open(urlWhatsapp, '_blank');
            
            // Limpieza express de los campos para dejar el mostrador listo para el siguiente cliente
            document.getElementById('inputGuia').value = '';
            document.getElementById('inputTelefono').value = '';
            document.getElementById('inputComentario').value = '';
        }
    </script>
</body>
</html>
